  <meta name="description" content="Colin Philippe, bijouterie-horlogerie à Chêne-Bourg depuis 1990. Création de bijoux à la main : colliers, bracelets, bagues, boucles d'oreilles, montres. Changement de pile, bracelets, réparation.">

  <link rel="stylesheet" href="css/style.css">
  <!-- Données structurées : PAS d'avis/note (les vrais ne sont pas encore connus, on ne publie pas de faux). -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "JewelryStore",
    "name": "Colin Philippe — Bijouterie-Horlogerie",
    "founder": "Philippe Colin",
    "foundingDate": "1990",
    "telephone": "+41223487580",
    "email": "bijouteriecolin@hotmail.fr",
    "address": { "@type": "PostalAddress", "streetAddress": "Rue de Genève 71", "postalCode": "1225", "addressLocality": "Chêne-Bourg", "addressRegion": "GE", "addressCountry": "CH" },
    "openingHours": ["Mo-Fr 10:00-19:00", "Sa 09:00-18:00"],
    "aggregateRating": { "@type": "AggregateRating", "ratingValue": "5", "reviewCount": "11", "bestRating": "5" },
    "review": [
      { "@type": "Review", "author": { "@type": "Person", "name": "Nils Engelberts" }, "reviewRating": { "@type": "Rating", "ratingValue": "5" }, "reviewBody": "Horloger bijoutier très aimable, très chaleureux. Très professionnel. Je recommande à 100%." },
      { "@type": "Review", "author": { "@type": "Person", "name": "Michèle Perroud" }, "reviewRating": { "@type": "Rating", "ratingValue": "5" }, "reviewBody": "Monsieur Colin est un magicien ! Il aime son métier et ça se voit dans ses très belles créations." }
    ]
  }
  </script>
</head>
